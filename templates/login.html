<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TyplOf — Login</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="login-container">
    <div class="login-box">
        <div class="login-logo">⌨️ TyplOf</div>
        <p class="login-subtitle">Select your preferred language</p>
        
        <div class="all-languages-info">
            🌍 162 languages supported! Add your JSON file to lessons/ folder.
        </div>
        
        <div class="login-options" id="languageOptions">
            <div class="loading-text">⏳ Loading languages...</div>
        </div>
        
        <div class="login-footer">
            <p>⚡ Type fast, type accurate, type professional!</p>
            <p style="font-size: 12px; color: #4a3a5a; margin-top: 8px;">
                📚 To add a new language: create <code>language_code.json</code> in <code>lessons/</code> folder
            </p>
            <p style="font-size: 12px; color: #4a3a5a; margin-top: 4px;">
                <a href="/rules" style="color:#FF6B35; text-decoration:none;">📖 See full rules</a>
            </p>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

let angle = 0, length = 0, x = 0, y = 150, step = 0;
const centerX = canvas.width / 2;
const centerY = canvas.height / 1.5;

function drawTurtleBackground() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const grad = ctx.createRadialGradient(
        canvas.width/2, canvas.height/2, 100,
        canvas.width/2, canvas.height/2, canvas.width*0.8
    );
    grad.addColorStop(0, '#0a0a1a');
    grad.addColorStop(0.5, '#050510');
    grad.addColorStop(1, '#000005');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    const colors = ['#00ff88', '#00cc66', '#00ffaa', '#66ff99', '#00ff77'];
    ctx.strokeStyle = colors[Math.floor(step / 40) % colors.length];
    ctx.lineWidth = 2.5;
    ctx.shadowColor = ctx.strokeStyle;
    ctx.shadowBlur = 25;

    if (step < 204) {
        const rad = angle * Math.PI / 180;
        const dx = length * Math.cos(rad);
        const dy = length * Math.sin(rad);
        ctx.beginPath();
        ctx.moveTo(centerX + x, centerY - y);
        ctx.lineTo(centerX + x + dx, centerY - y - dy);
        ctx.stroke();
        x += dx; y += dy; length += 3; angle += 1; step++;
    }
    
    ctx.shadowBlur = 0;
    for (let i = 0; i < 100; i++) {
        const sx = (i * 137.5 + 50) % canvas.width;
        const sy = (i * 97.3 + 30) % canvas.height;
        const size = (i % 3) + 1;
        const alpha = 0.1 + (i % 7) * 0.04;
        ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
        ctx.beginPath();
        ctx.arc(sx, sy, size, 0, Math.PI * 2);
        ctx.fill();
    }
    requestAnimationFrame(drawTurtleBackground);
}
drawTurtleBackground();

// ===== بارگذاری زبان‌ها =====
async function loadLanguages() {
    try {
        const res = await fetch('/api/languages');
        const languages = await res.json();
        
        const container = document.getElementById('languageOptions');
        if (languages.length === 0) {
            container.innerHTML = `
                <div class="no-languages">
                    <p>⚠️ No languages found!</p>
                    <p style="font-size:12px; color:#6a5a7a;">Add a JSON file to the lessons/ folder</p>
                </div>
            `;
            return;
        }
        
        container.innerHTML = languages.map(lang => `
            <a href="/?lang=${lang.code}" class="login-btn ${lang.code}">
                <span class="flag">🌍</span>
                <span class="label">${lang.name}</span>
                <span class="badge">${lang.lessons_count} lessons</span>
            </a>
        `).join('');
    } catch (e) {
        console.error('Error loading languages:', e);
        document.getElementById('languageOptions').innerHTML = `
            <div class="error-text">❌ Error loading languages</div>
        `;
    }
}

loadLanguages();
</script>

</body>
</html>
